<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
      }

      body {
        margin: 0;
        padding: 16px;
      }

      h1 {
        font-size: 17px;
        font-weight: 650;
        margin: 0 0 12px;
      }

      .wheel {
        position: relative;
        width: 260px;
        height: 260px;
        margin: 0 auto 14px;
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 50%;
      }

      .key {
        position: absolute;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid color-mix(in srgb, CanvasText 24%, transparent);
        background: Canvas;
        color: CanvasText;
        transform: translate(-50%, -50%);
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      .key:hover {
        border-color: AccentColor;
      }

      .key.selected {
        background: AccentColor;
        border-color: AccentColor;
        color: AccentColorText;
      }

      .center {
        position: absolute;
        inset: 92px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: color-mix(in srgb, CanvasText 8%, Canvas);
        text-align: center;
        font-weight: 650;
      }

      .center small {
        display: block;
        margin-top: 3px;
        font-size: 11px;
        font-weight: 500;
        opacity: 0.7;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      button.action {
        min-width: 96px;
        padding: 5px 12px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <h1>Negative Harmony</h1>
    <form id="form">
      <div class="wheel" id="wheel" aria-label="Key center circle of fifths">
        <div class="center">
          <div>
            <span id="selectedKey">C</span>
            <small>Key Center</small>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="action" type="submit">Convert</button>
      </div>
    </form>

    <script>
      const keyCenters = __KEY_CENTERS__;
      let selectedPitchClass = __SELECTED_PITCH_CLASS__;

      function sendToHost(result) {
        const message = { method: "close_and_send", params: [JSON.stringify(result)] };
        if (window.webkit?.messageHandlers?.live) {
          window.webkit.messageHandlers.live.postMessage(message);
          return;
        }
        if (window.chrome?.webview) {
          window.chrome.webview.postMessage(message);
        }
      }

      function renderWheel() {
        const wheel = document.getElementById("wheel");
        const selectedKey = document.getElementById("selectedKey");
        const radius = 110;
        const center = 130;

        for (let index = 0; index < keyCenters.length; index += 1) {
          const key = keyCenters[index];
          const angle = -Math.PI / 2 + (index / keyCenters.length) * Math.PI * 2;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "key";
          button.textContent = key.name;
          button.title = `${key.name} key center`;
          button.style.left = `${center + Math.cos(angle) * radius}px`;
          button.style.top = `${center + Math.sin(angle) * radius}px`;
          button.addEventListener("click", () => {
            selectedPitchClass = key.pitchClass;
            updateSelection();
          });
          wheel.appendChild(button);
        }

        function updateSelection() {
          const current = keyCenters.find((key) => key.pitchClass === selectedPitchClass) ?? keyCenters[0];
          selectedKey.textContent = current.name;
          for (const button of document.querySelectorAll(".key")) {
            button.classList.toggle("selected", button.textContent === current.name);
          }
        }

        updateSelection();
      }

      renderWheel();

      document.getElementById("form").addEventListener("submit", (event) => {
        event.preventDefault();
        const key = keyCenters.find((entry) => entry.pitchClass === selectedPitchClass) ?? keyCenters[0];
        sendToHost({
          action: "convert",
          tonicPitchClass: key.pitchClass,
          keyName: key.name,
        });
      });
    </script>
  </body>
</html>
